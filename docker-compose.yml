services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: lunar_car
      POSTGRES_USER: lunar
      POSTGRES_PASSWORD: lunar
    ports:
      - "5432:5432"
    volumes:
      - lunar_car_pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  lunar_car_pgdata:

